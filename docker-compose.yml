version: '3.8'
services:
  mysql:
    image: mysql:8.0
    container_name: greenbook_mysql
    ports:
      - "3306:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=rootpassword  # 设置数据库 root 密码
      - MYSQL_DATABASE=greenbook_db       # 启动时自动创建名为 greenbook_db 的库
    volumes:
      - mysql_data:/var/lib/mysql         # 数据卷挂载，防止容器重启后数据丢失
  
  redis:
    image: redis:latest
    container_name: greenbook_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  mysql_data:
  redis_data: